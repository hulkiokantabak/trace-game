<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="manifest.json">
  <title>Trace</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <div id="game-container">
    <div id="canvas-container">
      <canvas id="game-canvas" width="320" height="180"></canvas>
    </div>
    <div id="text-panel"></div>
  </div>
  <script src="js/engine.js"></script>
  <script src="js/state.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Engine.init(document.getElementById('game-canvas'));
      try {
        await Game.init();
      } catch (e) {
        console.error('Game init failed:', e);
        document.getElementById('text-panel').innerHTML =
          '<p style="color:#c8b8a0;font-family:monospace;text-align:center;padding:2rem;">' +
          'Could not load game data.<br><br>' +
          '<span style="color:#8a7a60;font-size:0.8rem;">' + (e.message || 'Unknown error') + '</span><br><br>' +
          '<button onclick="location.reload()" style="background:none;border:1px solid rgba(200,180,140,0.2);color:#c8b8a0;padding:0.5rem 1.5rem;font-family:monospace;cursor:pointer;min-height:44px;">Retry</button>' +
          '</p>';
        return;
      }
      UI.init(document.getElementById('text-panel'));
      Engine.start();
    });
  </script>
</body>
</html>
