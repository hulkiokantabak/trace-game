<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="manifest.json">
  <title>Trace</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <div id="game-container">
    <div id="canvas-container">
      <canvas id="game-canvas" width="320" height="180"></canvas>
    </div>
    <div id="text-panel"></div>
  </div>
  <script src="js/engine.js"></script>
  <script src="js/state.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Engine.init(document.getElementById('game-canvas'));
      try {
        await Game.init();
      } catch (e) {
        document.getElementById('text-panel').textContent = 'Could not load game data. Please refresh.';
        return;
      }
      UI.init(document.getElementById('text-panel'));
      Engine.start();
    });
  </script>
</body>
</html>
